<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sight-reading Practice with Mic Support</title>
  
  <!-- SEO & Link Preview Meta Tags -->

  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fdfdfd;
      color: #333;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #app-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Top Buttons */
    .top-btn {
      position: absolute;
      top: 1.5rem;
      font-size: 2rem;
      cursor: pointer;
      z-index: 10;
      transition: transform 0.2s;
      user-select: none;
    }
    .top-btn:hover { transform: scale(1.1); }
    #settings-btn { right: 1.5rem; }
    #stats-btn { right: 4.5rem; }
    #log-btn { right: 7.5rem; }

    /* Overlay Panels */
    .overlay-container {
      display: none;
      position: absolute;
      inset: 0;
      background: #fdfdfd;
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      max-height: 90vh;
      overflow-y: auto;
    }

    .panel h2 { margin-top: 0; text-align: center; margin-bottom: 1.5rem; }
    
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    
    .setting-row select, .setting-row input[type="range"], .setting-row input[type="number"] {
      padding: 0.4rem;
      font-size: 1rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      max-width: 55%;
    }

    .range-selects {
      display: flex; 
      gap: 0.5rem; 
      width: 55%;
    }
    
    .range-selects select {
      width: 100%;
      max-width: none;
    }

    /* Animation Classes */
    @keyframes highlightRow {
      0%, 100% { background-color: transparent; }
      20%, 80% { background-color: #dbeafe; } /* Soft tailwind blue */
    }
    .flash-highlight {
      animation: highlightRow 3s ease-in-out;
      border-radius: 6px;
      margin: -0.5rem;
      padding: 0.5rem;
    }

    @keyframes gaudyNeon {
      0%, 100% { color: #666; text-shadow: none; transform: scale(1); font-weight: normal; }
      10%, 50%, 90% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; transform: scale(1.05); font-weight: bold; }
      30%, 70% { color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; transform: scale(1.05); font-weight: bold; }
    }
    .flash-text-gaudy {
      animation: gaudyNeon 3.5s ease-in-out 1;
      display: inline-block;
      transition: color 0.3s;
    }

    .stats-list {
      margin-top: 1rem;
      padding: 1rem;
      background: #f8f9fa;
      border-radius: 8px;
      border: 1px solid #eee;
    }

    .stats-list p { 
      margin: 0.8rem 0; 
      font-size: 1.2rem; 
      display: flex; 
      justify-content: space-between; 
      border-bottom: 1px dashed #ddd; 
      padding-bottom: 0.4rem;
    }
    
    .stats-list p:last-child { border-bottom: none; padding-bottom: 0; }
    .stat-blue { color: #3b82f6; font-weight: bold; }
    .stat-red { color: #ef4444; font-weight: bold; }
    .stat-green { color: #10b981; font-weight: bold; }

    .log-list {
      margin-top: 1rem;
      background: #1e1e1e;
      color: #4ade80;
      padding: 1rem;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.85rem;
      max-height: 50vh;
      overflow-y: auto;
      text-align: left;
    }
    
    .log-list div {
      border-bottom: 1px solid #333;
      padding: 0.4rem 0;
      word-wrap: break-word;
    }
    
    .log-list div:last-child { border-bottom: none; }
    
    .btn {
      display: block;
      width: 100%;
      padding: 0.8rem;
      margin-top: 1rem;
      font-size: 1.1rem;
      font-weight: bold;
      color: white;
      background: #333;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    
    .btn:hover:not(:disabled) { background: #555; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    
    .btn-outline {
      background: transparent;
      color: #333;
      border: 2px solid #333;
      margin-top: 0.5rem;
    }
    
    .btn-outline:hover { background: #eee; }

    /* SVG Canvas */
    svg {
      width: 100%;
      height: 100%;
      max-height: 100vh;
      display: block;
    }

    .note-group {
      transition: transform 0.4s ease-in-out, opacity 0.4s;
    }

    .note-group ellipse, .note-group line, .note-group text, .note-group path {
      transition: fill 0.15s, stroke 0.15s;
    }

    .ui-layer {
      position: absolute;
      width: 100%;
      text-align: center;
      pointer-events: none;
    }

    .instructions {
      top: 5vh;
      color: #666;
      font-size: 1.2rem;
      padding: 0 1rem;
    }

    .buffer-display {
      bottom: 8vh;
      font-size: 2.5rem;
      font-weight: bold;
      color: #444;
      min-height: 3rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      .instructions { font-size: 0.95rem; }
      .buffer-display { font-size: 1.8rem; bottom: 5vh; }
      .top-btn { font-size: 1.6rem; }
      #settings-btn { right: 1rem; top: 1rem; }
      #stats-btn { right: 3.5rem; top: 1rem; }
      #log-btn { right: 6rem; top: 1rem; }
    }
  </style>

  <!-- ONNX Runtime Web Library for Neural Network Pitch Detection -->

<body>

  <div id="app-container">
    <div class="top-btn" id="log-btn" title="Activity Log">📝</div>
    <div class="top-btn" id="stats-btn" title="Stats">📊</div>
    <div class="top-btn" id="settings-btn" title="Settings">⚙️</div>

    <div class="ui-layer instructions">
      <div id="instruction-text">
        Type the note name on your keyboard, or <span id="mic-instruction-part">enable the mic in Settings to use an instrument</span>.
      </div>
    </div>

    <svg id="staff-svg" viewBox="0 80 1000 240" preserveAspectRatio="xMidYMid meet">
      <g id="staff-lines"></g>
      <g id="clef-container" fill="#333">
        <text id="treble-clef" x="110" y="238" font-size="130" font-family="'Apple Symbols', 'Segoe UI Symbol', 'Noto Music', 'Bravura', sans-serif" text-anchor="middle">&#119070;</text>
        <text id="bass-clef" x="110" y="225" font-size="110" font-family="'Apple Symbols', 'Segoe UI Symbol', 'Noto Music', 'Bravura', sans-serif" text-anchor="middle" style="display: none;">&#119074;</text>
      </g>
      <g id="key-signature-layer"></g>
      <g id="octave-indicator"></g>
      <g id="notes-layer"></g>
    </svg>

    <div class="ui-layer buffer-display" id="buffer-display"></div>
    
    <!-- Logs Overlay -->
    <div class="overlay-container" id="log-overlay">
      <div class="panel" style="max-width: 600px;">
        <h2>Activity Log</h2>
        <div id="log-list" class="log-list"></div>
        <button class="btn" id="log-return">Return to Staff</button>
      </div>
    </div>

    <!-- Stats Overlay -->
    <div class="overlay-container" id="stats-overlay">
      <div class="panel">
        <h2>Stats</h2>
        <div class="stats-list">
          <p>Time Elapsed: <span id="stat-time">00:00</span></p>
          <p>Correct Notes: <span id="stat-correct" class="stat-blue">0</span></p>
          <p>Mistakes Made: <span id="stat-mistakes" class="stat-red">0</span></p>
          <p>Accuracy: <span id="stat-ratio">0%</span></p>
          <p title="Penalized correct note rate: (Correct - Mistakes) / Minutes">Net Speed: <span id="stat-npm" class="stat-green">0 <span style="font-size: 0.8rem; font-weight: normal; color: #666;">NPM</span></span></p>
        </div>
        <button class="btn btn-outline" id="stat-reset">Reset Stats</button>
        <button class="btn" id="stats-return">Return to Staff</button>
      </div>
    </div>

    <!-- Settings Overlay -->
    <div class="overlay-container" id="settings-overlay">
      <div class="panel">
        <h2>Settings</h2>

        <!-- Input Method Pinned To Top -->
        <div class="setting-row" id="row-input-method">
          <label>Input Method</label>
          <select id="setting-input">
            <option value="keyboard" selected>Keyboard Typing</option>
            <option value="mic">Microphone (Any Instrument)</option>
          </select>
        </div>

        <div class="setting-row" id="row-mic-sensitivity" style="display: none;">
          <label>Mic Sensitivity</label>
          <select id="setting-mic-sensitivity">
            <option value="0.75">High (Picks up quiet/noisy notes)</option>
            <option value="0.85" selected>Medium (Default)</option>
            <option value="0.92">Low (Reduces background noise)</option>
            <option value="0.96">Very Low (Requires solid playing)</option>
          </select>
        </div>

        <div class="setting-row" id="row-mic-cooldown" style="display: none;">
          <label>Mic Cooldown</label>
          <div style="display: flex; align-items: center; width: 55%; gap: 0.5rem;">
            <input type="range" id="setting-mic-cooldown" min="50" max="500" step="10" value="150" style="flex-grow: 1;">
            <span id="mic-cooldown-display" style="min-width: 3.5rem; text-align: right; font-size: 0.9rem;">150ms</span>
          </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 1.5rem 0;">

        <!-- Generative Settings -->
        <div class="setting-row">
          <label>Clef</label>
          <select id="setting-clef">
            <option value="treble">Treble</option>
            <option value="bass">Bass</option>
            <option value="grand" selected>Grand (Bass+Treble)</option>
          </select>
        </div>

        <div class="setting-row" id="row-grand-mode">
          <label>Grand Staff Mode</label>
          <select id="setting-grand-mode">
            <option value="two-hand" selected>Two Hands (Separated)</option>
            <option value="one-hand">One Hand (Interlocked)</option>
          </select>
        </div>
        
        <div class="setting-row">
          <label>Key Signature</label>
          <select id="setting-key">
            <option value="C">C Major / A minor</option>
            <option value="G">G Major / E minor</option>
            <option value="D">D Major / B minor</option>
            <option value="A">A Major / F# minor</option>
            <option value="E">E Major / C# minor</option>
            <option value="B">B Major / G# minor</option>
            <option value="F">F Major / D minor</option>
            <option value="Bb">Bb Major / G minor</option>
            <option value="Eb">Eb Major / C minor</option>
            <option value="Ab">Ab Major / F minor</option>
            <option value="Db">Db Major / Bb minor</option>
            <option value="Gb">Gb Major / Eb minor</option>
          </select>
        </div>

        <div class="setting-row">
          <label>Accidentals</label>
          <select id="setting-accidentals">
            <option value="enabled">Enabled</option>
            <option value="disabled" selected>Disabled (Diatonic to Key Only)</option>
          </select>
        </div>

        <div class="setting-row">
          <label>Generation Mode</label>
          <select id="setting-mode">
            <option value="uniform">Uniform (Random)</option>
            <option value="chords" selected>Chords Sequences</option>
            <option value="teaching">Teaching (Adaptive)</option>
          </select>
        </div>

        <div class="setting-row" id="row-chord-style">
          <label>Chord Playback</label>
          <select id="setting-chord-style">
            <option value="arpeggio">Ascending / Descending</option>
            <option value="random" selected>Any Order</option>
          </select>
        </div>

        <div class="setting-row" id="row-chord-alternate">
          <label>Alternate Hands (Two-Hand)</label>
          <select id="setting-chord-alternate">
            <option value="enabled">Enabled</option>
            <option value="disabled" selected>Disabled</option>
          </select>
        </div>

        <div class="setting-row" id="row-teaching-keys" style="display: none;">
          <label>Starting Keys (Teaching)</label>
          <input type="number" id="setting-teaching-keys" min="1" max="20" value="6" style="width: 50%;">
        </div>

        <div class="setting-row" id="row-teaching-scale" style="display: none;">
          <label>Adaptation Scale (Teaching)</label>
          <input type="number" id="setting-teaching-scale" min="5" max="100" value="20" style="width: 50%;">
        </div>

        <div class="setting-row">
          <label>Treble Range</label>
          <div class="range-selects">
            <select id="setting-treble-min"></select>
            <select id="setting-treble-max"></select>
          </div>
        </div>

        <div class="setting-row">
          <label>Bass Range</label>
          <div class="range-selects">
            <select id="setting-bass-min"></select>
            <select id="setting-bass-max"></select>
          </div>
        </div>

        <div class="setting-row">
          <label>Octave</label>
          <select id="setting-octave">
            <option value="0" selected>Standard</option>
            <option value="1">8va (Play higher)</option>
            <option value="-1">8vb (Play lower)</option>
          </select>
        </div>

        <button class="btn" id="settings-save">Save & Reset Staff</button>
        
        <div style="text-align: center; margin-top: 1.5rem;">
          <a href="https://github.com/chausies/chausies.github.io/tree/main/sightreading" target="_blank" style="color: #888; text-decoration: underline; font-size: 0.95rem;">About / Source Code</a>
        </div>
      </div>
    </div>

  </div>

  <script>
    // =========================================================
    // General Configuration & Constants
    // =========================================================
    let X_START = 220;
    const X_STEP = 90;
    const COLOR_PENDING = '#333';
    const COLOR_CORRECT = '#3b82f6';
    const COLOR_ERROR = '#ef4444';

    // =========================================================
    // Global Pause State
    // =========================================================
    let isAppPaused = false;
    let pauseTimestamp = 0;

    function checkPauseState() {
      const p1 = document.getElementById('settings-overlay').style.display === 'flex';
      const p2 = document.getElementById('stats-overlay').style.display === 'flex';
      const p3 = document.getElementById('log-overlay').style.display === 'flex';
      const isFocused = document.hasFocus();

      const shouldBePaused = p1 || p2 || p3 || !isFocused;

      if (shouldBePaused && !isAppPaused) {
        isAppPaused = true;
        pauseTimestamp = Date.now();
      } else if (!shouldBePaused && isAppPaused) {
        isAppPaused = false;
        const pauseDuration = Date.now() - pauseTimestamp;
        stats.startTime += pauseDuration;
        currentNoteStartTime += pauseDuration;
      }
    }

    window.addEventListener('blur', checkPauseState);
    window.addEventListener('focus', checkPauseState);

    // =========================================================
    // Logger
    // =========================================================
    const AppLog = {
      messages: [],
      add: function(msg) {
        const time = new Date().toLocaleTimeString([], {hour12:false});
        this.messages.unshift(`[${time}] ${msg}`);
        if(this.messages.length > 100) this.messages.pop();
        this.render();
      },
      render: function() {
        const container = document.getElementById('log-list');
        if(container) container.innerHTML = this.messages.map(m => `<div>${m}</div>`).join('');
      }
    };

    // =========================================================
    // Settings State
    // =========================================================
    const appSettings = {
      clef: 'grand',
      grandMode: 'two-hand',
      accidentals: false,
      trebleMin: 'd3',
      trebleMax: 'g6',
      bassMin: 'c2', 
      bassMax: 'b4',
      key: 'C',
      octave: 0,
      mode: 'chords',
      chordStyle: 'random',
      chordAlternate: false, // Updated to disabled by default
      teachingKeys: 6,
      teachingScale: 20,
      input: 'keyboard',
      micSensitivity: 0.85, 
      micCooldown: 150
    };

    // Range List Setup
    const notesList = [];
    for (let oct = 1; oct <= 7; oct++) {
      ['c','d','e','f','g','a','b'].forEach(p => {
        notesList.push({ val: p + oct, label: p.toUpperCase() + oct });
      });
    }

    function populateSelect(id, defaultVal) {
      const el = document.getElementById(id);
      el.innerHTML = '';
      notesList.forEach(n => {
        const opt = document.createElement('option');
        opt.value = n.val;
        opt.textContent = n.label;
        if (n.val === defaultVal) opt.selected = true;
        el.appendChild(opt);
      });
    }

    populateSelect('setting-treble-min', appSettings.trebleMin);
    populateSelect('setting-treble-max', appSettings.trebleMax);
    populateSelect('setting-bass-min', appSettings.bassMin);
    populateSelect('setting-bass-max', appSettings.bassMax);

    // =========================================================
    // App State
    // =========================================================
    let activeNotes = [];
    let currentIndex = 0;
    let globalNoteId = 0;
    let inputBuffer = '';
    let isShifting = false;
    let visibleNoteCount = 8; 
    let currentNoteStartTime = Date.now();

    // Stats State
    const stats = {
      startTime: Date.now(),
      correct: 0,
      mistakes: 0
    };

    // Music Definitions
    const keySigs = {
      'C': [],
      'G':  [{p:'f', a:'#'}],
      'D':  [{p:'f', a:'#'}, {p:'c', a:'#'}],
      'A':  [{p:'f', a:'#'}, {p:'c', a:'#'}, {p:'g', a:'#'}],
      'E':  [{p:'f', a:'#'}, {p:'c', a:'#'}, {p:'g', a:'#'}, {p:'d', a:'#'}],
      'B':  [{p:'f', a:'#'}, {p:'c', a:'#'}, {p:'g', a:'#'}, {p:'d', a:'#'}, {p:'a', a:'#'}],
      'F':  [{p:'b', a:'b'}],
      'Bb': [{p:'b', a:'b'}, {p:'e', a:'b'}],
      'Eb': [{p:'b', a:'b'}, {p:'e', a:'b'}, {p:'a', a:'b'}],
      'Ab': [{p:'b', a:'b'}, {p:'e', a:'b'}, {p:'a', a:'b'}, {p:'d', a:'b'}],
      'Db': [{p:'b', a:'b'}, {p:'e', a:'b'}, {p:'a', a:'b'}, {p:'d', a:'b'}, {p:'g', a:'b'}],
      'Gb': [{p:'b', a:'b'}, {p:'e', a:'b'}, {p:'a', a:'b'}, {p:'d', a:'b'}, {p:'g', a:'b'}, {p:'c', a:'b'}]
    };

    const keySigOctaves = {
      'treble': {
        '#': { f:5, c:5, g:5, d:5, a:4, e:5, b:4 },
        'b': { b:4, e:5, a:4, d:5, g:4, c:5, f:4 }
      },
      'bass': {
        '#': { f:3, c:3, g:3, d:3, a:2, e:3, b:2 },
        'b': { b:2, e:3, a:2, d:3, g:2, c:3, f:2 }
      }
    };

    const treblePool = [];
    const bassPool = [];

    // =========================================================
    // Core Logic & View Helpers
    // =========================================================
    function updateViewBoxAndCount() {
      const isNarrow = window.innerWidth < 768;
      visibleNoteCount = isNarrow ? 4 : 8;
      
      const svg = document.getElementById('staff-svg');
      const vWidth = isNarrow ? 600 : 1000;
      
      if (appSettings.clef === 'grand') {
        if (appSettings.grandMode === 'two-hand') {
          svg.setAttribute('viewBox', `0 -20 ${vWidth} 560`); 
        } else {
          svg.setAttribute('viewBox', `0 20 ${vWidth} 420`);
        }
      } else {
        svg.setAttribute('viewBox', `0 40 ${vWidth} 320`);
      }
    }

    function noteStringToIdx(str) {
      if (!str) return 0;
      const p = str[0];
      const o = parseInt(str[1], 10);
      const pitchVals = { 'c': 0, 'd': 1, 'e': 2, 'f': 3, 'g': 4, 'a': 5, 'b': 6 };
      return pitchVals[p] + (o - 4) * 7;
    }

    function calculateY(pitch, oct, noteClef) {
      let idx = noteStringToIdx(pitch + oct);
      
      if (appSettings.clef === 'grand') {
        if (noteClef === 'treble') return 260 - idx * 10;
        if (noteClef === 'bass') {
          return appSettings.grandMode === 'two-hand' ? 320 - idx * 10 : 260 - idx * 10;
        }
      }
      if (appSettings.clef === 'treble') return 260 - idx * 10;
      return 140 - idx * 10; // single bass
    }

    function getVisualAccidental(pitch, trueAcc) {
      const activeKeySigs = keySigs[appSettings.key] || [];
      const keyAcc = activeKeySigs.find(k => k.p === pitch);
      const defaultAcc = keyAcc ? keyAcc.a : '';
      if (trueAcc === defaultAcc) return '';
      if (trueAcc === '') return 'n';
      return trueAcc;
    }

    function parseInput(str) {
      if (!str) return null;
      const pitch = str[0];
      const octMatch = str.match(/\d+/);
      if (!octMatch) return null;
      const oct = parseInt(octMatch[0], 10);
      let acc = '';
      if (str.includes('#')) acc = '#';
      else if (str.includes('b')) acc = 'b';
      return { pitch, acc, oct };
    }

    function hzToMidi(hz) {
      if (hz < 46.875 || hz > 2093.75) return -1;
      return Math.round(69 + 12 * Math.log2(hz / 440.0));
    }

    function midiToNoteString(midi) {
      const pitches = ['c', 'c#', 'd', 'd#', 'e', 'f', 'f#', 'g', 'g#', 'a', 'a#', 'b'];
      const oct = Math.floor(midi / 12) - 1;
      const pitch = pitches[midi % 12];
      return pitch + oct; 
    }

    function createSVGElement(tag, attrs) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      for (let k in attrs) el.setAttribute(k, attrs[k]);
      return el;
    }

    // =========================================================
    // Drawing Helpers
    // =========================================================
    function drawDecorations() {
      const staffGroup = document.getElementById('staff-lines');
      staffGroup.innerHTML = '';
      const drawLines = (startY) => {
        for (let i = 0; i < 5; i++) {
          staffGroup.appendChild(createSVGElement('line', { x1: 40, x2: 960, y1: startY + i*20, y2: startY + i*20, stroke: '#333', 'stroke-width': 2 }));
        }
      };

      if (appSettings.clef === 'grand') {
        drawLines(160); // Treble
        const bassY = appSettings.grandMode === 'two-hand' ? 340 : 280;
        drawLines(bassY); // Bass
        const bracketHeight = bassY + 80 - 160;
        staffGroup.appendChild(createSVGElement('path', {
          d: `M 35 160 C 10 160 10 ${160 + bracketHeight/2} 0 ${160 + bracketHeight/2} C 10 ${160 + bracketHeight/2} 10 ${160 + bracketHeight} 35 ${160 + bracketHeight} C 20 ${160 + bracketHeight} 20 ${160 + bracketHeight/2} 10 ${160 + bracketHeight/2} C 20 ${160 + bracketHeight/2} 20 160 35 160 Z`,
          fill: '#333'
        }));
        staffGroup.appendChild(createSVGElement('line', { x1: 40, x2: 40, y1: 160, y2: 160 + bracketHeight, stroke: '#333', 'stroke-width': 2 }));
      } else {
        drawLines(160);
      }

      const tClef = document.getElementById('treble-clef');
      const bClef = document.getElementById('bass-clef');
      if (appSettings.clef === 'treble') {
        tClef.style.display = 'block'; tClef.setAttribute('y', '238');
        bClef.style.display = 'none';
      } else if (appSettings.clef === 'bass') {
        tClef.style.display = 'none';
        bClef.style.display = 'block'; bClef.setAttribute('y', '225');
      } else if (appSettings.clef === 'grand') {
        tClef.style.display = 'block'; tClef.setAttribute('y', '238');
        bClef.style.display = 'block'; 
        bClef.setAttribute('y', appSettings.grandMode === 'two-hand' ? '405' : '345');
      }

      const group = document.getElementById('key-signature-layer');
      group.innerHTML = '';
      const accs = keySigs[appSettings.key];
      let xOffset = 170;
      
      const drawAccidentals = (clefType) => {
        let localX = 170;
        if (accs && accs.length > 0) {
          const isSharp = accs[0].a === '#';
          accs.forEach(acc => {
            const oct = keySigOctaves[clefType][isSharp ? '#' : 'b'][acc.p];
            let y = 0;
            
            if (appSettings.clef === 'grand') {
              let idx = noteStringToIdx(acc.p + oct);
              y = clefType === 'treble' ? 260 - idx * 10 : (appSettings.grandMode === 'two-hand' ? 320 - idx * 10 : 260 - idx * 10);
            } else {
              let idx = noteStringToIdx(acc.p + oct);
              y = clefType === 'treble' ? 260 - idx * 10 : 140 - idx * 10;
            }
            
            group.appendChild(createSVGElement('text', {
              x: localX, y: y + 6, 'font-size': 26, fill: '#333', 'font-family': 'sans-serif'
            })).textContent = isSharp ? '♯' : '♭';
            localX += 16;
          });
        }
        return localX;
      };

      if (appSettings.clef === 'grand') {
        drawAccidentals('treble');
        xOffset = drawAccidentals('bass');
      } else {
        xOffset = drawAccidentals(appSettings.clef);
      }
      X_START = Math.max(220, xOffset + 40);

      const octGroup = document.getElementById('octave-indicator');
      octGroup.innerHTML = '';
      if (appSettings.octave !== 0) {
        let yPos;
        if (appSettings.clef === 'grand') yPos = appSettings.octave === 1 ? 110 : (appSettings.grandMode === 'two-hand' ? 470 : 390);
        else yPos = appSettings.octave === 1 ? 110 : 280;

        octGroup.appendChild(createSVGElement('text', {
          x: 100, y: yPos, 'font-size': 20, fill: '#333', 'font-style': 'italic', 'font-weight': 'bold'
        })).textContent = appSettings.octave === 1 ? '8va' : '8vb';

        octGroup.appendChild(createSVGElement('line', {
          x1: 140, x2: 960, y1: yPos - 6, y2: yPos - 6, stroke: '#333', 'stroke-width': 1, 'stroke-dasharray': '5,5'
        }));
      }
    }

    function appendNoteVisuals(g, y, visualAcc, headColor, accColor, noteClef) {
      const drawLine = (ly) => g.appendChild(createSVGElement('line', { x1: -22, x2: 22, y1: ly, y2: ly, stroke: headColor, 'stroke-width': 2 }));
      
      let staffTop, staffBottom;
      if (appSettings.clef === 'grand') {
        if (noteClef === 'treble') { staffTop = 160; staffBottom = 240; }
        else { 
          staffTop = appSettings.grandMode === 'two-hand' ? 340 : 280; 
          staffBottom = staffTop + 80; 
        }
      } else if (appSettings.clef === 'treble') {
        staffTop = 160; staffBottom = 240;
      } else {
        staffTop = 160; staffBottom = 240; 
      }

      if (y <= staffTop - 20) {
        for (let ly = staffTop - 20; ly >= y; ly -= 20) drawLine(ly);
      }
      if (y >= staffBottom + 20) {
        for (let ly = staffBottom + 20; ly <= y; ly += 20) drawLine(ly);
      }

      g.appendChild(createSVGElement('ellipse', {
        cx: 0, cy: y, rx: 14, ry: 10, transform: `rotate(-20 0 ${y})`, fill: headColor
      }));

      const isStemUp = y > (staffTop + 40);
      g.appendChild(createSVGElement('line', {
        x1: isStemUp ? 12 : -12, x2: isStemUp ? 12 : -12,
        y1: y, y2: isStemUp ? y - 35 : y + 35, stroke: headColor, 'stroke-width': 2
      }));

      if (visualAcc) {
        const accText = createSVGElement('text', {
          x: -32, y: y + 6, 'font-size': 26, fill: accColor, 'font-family': 'sans-serif'
        });
        if (visualAcc === '#') accText.textContent = '♯';
        else if (visualAcc === 'b') accText.textContent = '♭';
        else if (visualAcc === 'n') accText.textContent = '♮';
        g.appendChild(accText);
      }
    }

    // =========================================================
    // Modular Note Generation
    // =========================================================
    function buildPools() {
      treblePool.length = 0; bassPool.length = 0;
      const pitches = ['c', 'd', 'e', 'f', 'g', 'a', 'b'];
      const semitones = { 'c': 0, 'd': 2, 'e': 4, 'f': 5, 'g': 7, 'a': 9, 'b': 11 };
      const accidentals = ['', '#', 'b'];
      const forbidden = ['cb', 'fb', 'b#', 'e#'];

      const t1 = noteStringToIdx(appSettings.trebleMin);
      const t2 = noteStringToIdx(appSettings.trebleMax);
      const b1 = noteStringToIdx(appSettings.bassMin);
      const b2 = noteStringToIdx(appSettings.bassMax);

      const tMinIdx = Math.min(t1, t2);
      const tMaxIdx = Math.max(t1, t2);
      const bMinIdx = Math.min(b1, b2);
      const bMaxIdx = Math.max(b1, b2);

      const addNotes = (pool, minIdx, maxIdx, baseOct, clefType) => {
        for (let visualOct = 1; visualOct <= 7; visualOct++) {
          for (let p of pitches) {
            let idx = noteStringToIdx(p + visualOct);
            if (idx >= minIdx && idx <= maxIdx) {
              for (let acc of accidentals) {
                if (forbidden.includes(p + acc)) continue;
                const actualOct = visualOct + appSettings.octave;
                const midi = (actualOct + 1) * 12 + semitones[p] + (acc === '#' ? 1 : acc === 'b' ? -1 : 0);
                
                pool.push({
                  pitch: p, trueAcc: acc, actualOct: actualOct, visualOct: visualOct,
                  displayStr: p + acc + actualOct, midi: midi, noteClef: clefType
                });
              }
            }
          }
        }
      };

      addNotes(treblePool, tMinIdx, tMaxIdx, 4, 'treble'); 
      addNotes(bassPool, bMinIdx, bMaxIdx, 4, 'bass');     
    }

    // Pass a preferredClef parameter to ensure grand-staff chord sequences stay in the same clef
    function getBestNoteForMidi(midi, pool, currentKey, preferredClef = null) {
      let candidates = pool.filter(n => n.midi === midi);
      if (candidates.length === 0) return null;
      
      if (preferredClef) {
        const clefCands = candidates.filter(n => n.noteClef === preferredClef);
        if (clefCands.length > 0) candidates = clefCands;
      }
      
      if (candidates.length === 1) return candidates[0];
      
      const keyAccs = keySigs[currentKey] || [];
      for (let cand of candidates) {
        const keyAcc = keyAccs.find(k => k.p === cand.pitch);
        if (keyAcc && keyAcc.a === cand.trueAcc) return cand; 
        if (!keyAcc && cand.trueAcc === '') return cand; 
      }
      
      const hasFlats = keyAccs.some(k => k.a === 'b');
      const prefAcc = hasFlats ? 'b' : '#';
      const alignedCand = candidates.find(c => c.trueAcc === prefAcc);
      return alignedCand || candidates[0];
    }

    const NoteGenerator = {
      chordQueue: [],
      teachingPool: [],
      likelihoods: [],
      timesQueue: [],
      recentMisses: [],
      lastGeneratedNote: null,
      
      init: function() {
        this.chordQueue = [];
        this.timesQueue = [];
        this.recentMisses = [];
        this.lastGeneratedNote = null;

        let activePool = appSettings.clef === 'bass' ? bassPool : (appSettings.clef === 'grand' ? [...bassPool, ...treblePool] : treblePool);
        
        if (!appSettings.accidentals) {
          activePool = activePool.filter(n => getVisualAccidental(n.pitch, n.trueAcc) === '');
        }

        this.teachingPool = activePool.slice().sort((a, b) => {
          if (a.noteClef !== b.noteClef) return a.noteClef === 'bass' ? -1 : 1;
          return a.midi - b.midi;
        });

        if (appSettings.mode === 'teaching') {
          let k = appSettings.teachingKeys;
          if (k > this.teachingPool.length) k = this.teachingPool.length;
           
          this.likelihoods = new Array(this.teachingPool.length).fill(0.0);
          let anchorIndices = [];

          if (appSettings.clef === 'grand') {
            let bassIndices = this.teachingPool.map((n, i) => n.noteClef === 'bass' ? i : -1).filter(i => i !== -1);
            let trebleIndices = this.teachingPool.map((n, i) => n.noteClef === 'treble' ? i : -1).filter(i => i !== -1);
              
            let k1 = Math.floor(k / 2);
            let k2 = Math.floor(k / 2);
            if (k % 2 !== 0) {
              if (Math.random() > 0.5) k1++; else k2++;
            }
              
            const pickRandom = (arr, count) => {
              let shuffled = arr.slice().sort(() => 0.5 - Math.random());
              return shuffled.slice(0, count);
            };
              
            anchorIndices = [...pickRandom(bassIndices, Math.min(k1, bassIndices.length)), ...pickRandom(trebleIndices, Math.min(k2, trebleIndices.length))];
          } else {
            let allIndices = this.teachingPool.map((_, i) => i);
            anchorIndices = allIndices.sort(() => 0.5 - Math.random()).slice(0, k);
          }

          anchorIndices.forEach(idx => this.likelihoods[idx] = 1.0);
          AppLog.add(`NoteGenerator re-initialized in Teaching Mode with ${anchorIndices.length} anchors.`);
        } else {
          AppLog.add(`NoteGenerator re-initialized (Mode: ${appSettings.mode}).`);
        }
      },

      generate: function(count) {
        let results = [];
        for (let i = 0; i < count; i++) {
          if (appSettings.mode === 'uniform') results.push(this._uniform());
          else if (appSettings.mode === 'chords') results.push(this._chords());
          else if (appSettings.mode === 'teaching') results.push(this._teaching());
        }
        return results;
      },

      feedback: function(noteData, timeToPlay, mistakes) {
        if (appSettings.mode !== 'teaching') return;

        let idx = this.teachingPool.findIndex(n => n.midi === noteData.midi && n.noteClef === noteData.noteClef && n.trueAcc === noteData.trueAcc);
        if (idx === -1) return;

        if (mistakes > 0) {
          const alreadyInQueue = this.recentMisses.some(n => n.midi === noteData.midi && n.noteClef === noteData.noteClef && n.trueAcc === noteData.trueAcc);
          if (!alreadyInQueue) {
            this.recentMisses.push(noteData);
          }
        }

        const s = appSettings.teachingScale;
        if (this.timesQueue.length === s) {
          let mean = this.timesQueue.reduce((a,b) => a+b, 0) / s;
          let variance = this.timesQueue.reduce((a,b) => a + Math.pow(b - mean, 2), 0) / s;
          let std = Math.sqrt(variance);
          std = Math.max(50, std);

          if (timeToPlay > mean + 2 * std) {
            this.likelihoods[idx] += 1.0;
          } else {
            this.timesQueue.push(timeToPlay);
            this.timesQueue.shift();
          }
        } else {
          this.timesQueue.push(timeToPlay);
        }
      },

      _uniform: function() {
        if (this.teachingPool.length === 0) return treblePool[0]; // Failsafe
        if (this.teachingPool.length === 1) return this.teachingPool[0];

        let chosenNote;
        let attempts = 0;
        
        do {
          chosenNote = this.teachingPool[Math.floor(Math.random() * this.teachingPool.length)];
          attempts++;
        } while (this.lastGeneratedNote && chosenNote.midi === this.lastGeneratedNote.midi && attempts < 10);

        this.lastGeneratedNote = chosenNote;
        return chosenNote;
      },

      _teaching: function() {
        if (this.teachingPool.length <= 1) {
          this.lastGeneratedNote = this.teachingPool[0] || treblePool[0];
          return this.lastGeneratedNote;
        }

        let chosenNote = null;
        let chosenIdx = -1;
        const q = 1 / 3;

        if (this.recentMisses.length > 0 && Math.random() < q) {
          const missIdx = this.recentMisses.findIndex(n => !this.lastGeneratedNote || n.midi !== this.lastGeneratedNote.midi);
          if (missIdx !== -1) {
            chosenNote = this.recentMisses.splice(missIdx, 1)[0];
            chosenIdx = this.teachingPool.findIndex(n => n.midi === chosenNote.midi && n.noteClef === chosenNote.noteClef && n.trueAcc === chosenNote.trueAcc);
          }
        }

        if (!chosenNote) {
          let tempLikelihoods = [...this.likelihoods];
          let sum = 0;

          if (this.lastGeneratedNote) {
            const lastIdx = this.teachingPool.findIndex(n => n.midi === this.lastGeneratedNote.midi && n.noteClef === this.lastGeneratedNote.noteClef && n.trueAcc === this.lastGeneratedNote.trueAcc);
            if (lastIdx !== -1) {
              tempLikelihoods[lastIdx] = 0;
            }
          }

          sum = tempLikelihoods.reduce((a, b) => a + b, 0);

          if (sum <= 0) {
            const availableIndices = tempLikelihoods.map((_, i) => i).filter(i => !this.lastGeneratedNote || this.teachingPool[i].midi !== this.lastGeneratedNote.midi);
            chosenIdx = availableIndices.length > 0 ? availableIndices[Math.floor(Math.random() * availableIndices.length)] : Math.floor(Math.random() * this.teachingPool.length);
            this.likelihoods[chosenIdx] = 1.0;
            sum = 1.0;
          } else {
            let r = Math.random() * sum;
            let runningSum = 0;
            for (let i = 0; i < tempLikelihoods.length; i++) {
              runningSum += tempLikelihoods[i];
              if (r <= runningSum && tempLikelihoods[i] > 0) {
                chosenIdx = i;
                break;
              }
            }
          }

          if (chosenIdx === -1) chosenIdx = this.teachingPool.length - 1;
          chosenNote = this.teachingPool[chosenIdx];
        }

        // Diffusion Updates (23-width half-step kernel)
        if (chosenIdx !== -1) {
          const s = appSettings.teachingScale;
          const p = Math.PI / (2 * Math.pow(s + 1 / 3, 2));

          this.likelihoods[chosenIdx] = Math.max(0, this.likelihoods[chosenIdx] - p);

          const kernelWeights = {
            1: 1, 2: 4, 3: 6, 4: 8, 5: 8, 6: 1, 
            7: 10, 8: 5, 9: 6, 10: 3, 11: 2
          };
          const kernelSum = 108; // Total sum (54 * 2 directions)

          const centerMidi = this.teachingPool[chosenIdx].midi;
          const centerClef = this.teachingPool[chosenIdx].noteClef;

          for (let i = 0; i < this.teachingPool.length; i++) {
            if (i === chosenIdx) continue;
            if (this.teachingPool[i].noteClef !== centerClef) continue;
                
            const diff = Math.abs(this.teachingPool[i].midi - centerMidi);
            if (diff >= 1 && diff <= 11) {
              const normalizedWeight = kernelWeights[diff] / kernelSum;
              this.likelihoods[i] += p * normalizedWeight;
            }
          }
        }

        this.lastGeneratedNote = chosenNote;
        return chosenNote;
      },

      _chords: function() {
        if (this.chordQueue.length > 0) return this.chordQueue.shift();

        const fullPool = appSettings.clef === 'bass' ? bassPool : (appSettings.clef === 'grand' ? [...bassPool, ...treblePool] : treblePool);
        const intervalSets = [[0, 4, 7, 11], [0, 3, 7, 10], [0, 4, 7, 9], [0, 3, 7, 9]];

        // DRY Chord Building Helper
        const buildChord = (rootPool, targetPitchClass = null, avoidPitchClass = null) => {
          let attempts = 0;
          let finalChord = [];
          const maxMidi = Math.max(...rootPool.map(p => p.midi));

          while (attempts < 50) {
            let rootNote;
            if (targetPitchClass !== null) {
              const cands = rootPool.filter(n => n.midi % 12 === targetPitchClass);
              if (cands.length === 0) { attempts++; continue; }
              rootNote = cands[Math.floor(Math.random() * cands.length)];
            } else {
              rootNote = rootPool[Math.floor(Math.random() * rootPool.length)];
              if (avoidPitchClass !== null && rootNote.midi % 12 === avoidPitchClass) {
                attempts++; continue;
              }
            }

            const rootMidi = rootNote.midi;
            if (rootMidi + 24 > maxMidi) { attempts++; continue; } 

            const intervals = intervalSets[Math.floor(Math.random() * intervalSets.length)];
            let chordMidis = intervals.map(i => rootMidi + i);

            const inv = Math.floor(Math.random() * 4);
            for (let i = 0; i < inv; i++) {
              let minMidi = Math.min(...chordMidis);
              chordMidis[chordMidis.indexOf(minMidi)] += 12;
            }
            chordMidis.sort((a, b) => a - b);
            if (Math.random() > 0.5) chordMidis.reverse();

            // Force getting the note from the same clef as the root note to prevent out-of-hand drops
            let candidateNotes = chordMidis.map(m => getBestNoteForMidi(m, fullPool, appSettings.key, rootNote.noteClef));
            if (candidateNotes.some(n => !n)) { attempts++; continue; }

            if (!appSettings.accidentals) {
              const hasAccidentals = candidateNotes.some(n => getVisualAccidental(n.pitch, n.trueAcc) !== '');
              if (hasAccidentals) { attempts++; continue; }
            }

            finalChord = candidateNotes;
            break;
          }
          return finalChord.length > 0 ? finalChord : [rootPool[0]];
        };

        const isAlternate = appSettings.clef === 'grand' && 
                            appSettings.grandMode === 'two-hand' && 
                            appSettings.chordAlternate;

        if (isAlternate) {
          // 1. Build Left Hand Chord (Bass)
          let bassChord = buildChord(bassPool);
          const bassRootClass = bassChord[0].midi % 12;
          
          // 2. Build Consonant Right Hand Chord (Treble)
          const consonantIntervals = [5, 7, 4, 9]; // P4, P5, M3, M6
          const targetPitchClass = (bassRootClass + consonantIntervals[Math.floor(Math.random() * consonantIntervals.length)]) % 12;

          let trebleChord = buildChord(treblePool, targetPitchClass);
          if (trebleChord.length === 1 && trebleChord[0] === treblePool[0]) {
             // Fallback if target class fails constraints
             trebleChord = buildChord(treblePool, null, bassRootClass); 
          }

          if (appSettings.chordStyle === 'random') {
            bassChord.sort(() => 0.5 - Math.random());
            trebleChord.sort(() => 0.5 - Math.random());
          }

          // 3. Interleave Chords
          let interleaved = [];
          let startLeft = Math.random() > 0.5;
          for (let i = 0; i < 4; i++) {
            if (startLeft) {
              interleaved.push(bassChord[i % bassChord.length], trebleChord[i % trebleChord.length]);
            } else {
              interleaved.push(trebleChord[i % trebleChord.length], bassChord[i % bassChord.length]);
            }
          }
          this.chordQueue = interleaved;
        } else {
          // Standard Single Chord Generation
          const rootPool = this.teachingPool.length > 0 ? this.teachingPool : fullPool;
          let finalChord = buildChord(rootPool);
          
          if (appSettings.chordStyle === 'random') {
            finalChord.sort(() => 0.5 - Math.random());
          }
          this.chordQueue = finalChord;
        }

        return this.chordQueue.shift();
      }
    };

    // =========================================================
    // App Rendering Loop
    // =========================================================
    function renderNotes() {
      const layer = document.getElementById('notes-layer');

      activeNotes.forEach((n, idx) => {
        let el = document.getElementById(n.id);
        const targetX = X_START + idx * X_STEP;
        
        if (!el) {
          el = createSVGElement('g', { 'class': 'note-group', 'id': n.id });
          layer.appendChild(el);
        }
        
        el.style.transform = `translateX(${targetX}px)`;

        const stateKey = n.state + '-' + (n.errorInput || '');
        if (el.getAttribute('data-rendered-state') !== stateKey) {
          el.innerHTML = ''; 
          
          const targetY = calculateY(n.data.pitch, n.data.visualOct, n.data.noteClef);
          const targetVisualAcc = getVisualAccidental(n.data.pitch, n.data.trueAcc);

          if (n.state === 'pending') {
            appendNoteVisuals(el, targetY, targetVisualAcc, COLOR_PENDING, COLOR_PENDING, n.data.noteClef);
          } else if (n.state === 'correct') {
            appendNoteVisuals(el, targetY, targetVisualAcc, COLOR_CORRECT, COLOR_CORRECT, n.data.noteClef);
          } else if (n.state === 'error') {
            const errorData = parseInput(n.errorInput);
            if (!errorData) {
              appendNoteVisuals(el, targetY, targetVisualAcc, COLOR_PENDING, COLOR_PENDING, n.data.noteClef);
            } else {
              const errorVisualOct = errorData.oct - appSettings.octave;
              const errorY = calculateY(errorData.pitch, errorVisualOct, n.data.noteClef);
              const errorVisualAcc = getVisualAccidental(errorData.pitch, errorData.acc);

              if (errorY !== targetY) {
                appendNoteVisuals(el, targetY, targetVisualAcc, COLOR_PENDING, COLOR_PENDING, n.data.noteClef);
                appendNoteVisuals(el, errorY, errorVisualAcc, COLOR_ERROR, COLOR_ERROR, n.data.noteClef);
              } else {
                if (errorVisualAcc === '') {
                  appendNoteVisuals(el, targetY, targetVisualAcc, COLOR_ERROR, COLOR_PENDING, n.data.noteClef);
                } else {
                  appendNoteVisuals(el, targetY, errorVisualAcc, COLOR_PENDING, COLOR_ERROR, n.data.noteClef);
                }
              }
            }
          }
          el.setAttribute('data-rendered-state', stateKey);
        }
      });

      Array.from(layer.children).forEach(child => {
        if (!activeNotes.find(n => n.id === child.id)) {
          child.style.opacity = '0';
          setTimeout(() => child.remove(), 400); 
        }
      });
    }

    function initNotes() {
      updateViewBoxAndCount();
      activeNotes = [];
      currentIndex = 0;
      globalNoteId = 0;
      
      NoteGenerator.init();
      document.getElementById('notes-layer').innerHTML = '';
      
      const generated = NoteGenerator.generate(visibleNoteCount);
      generated.forEach(data => {
        activeNotes.push({ data: data, id: 'note-' + globalNoteId++, state: 'pending', errorInput: null, mistakeCount: 0 });
      });

      currentNoteStartTime = Date.now();
      renderNotes();
    }

    function shiftNotes() {
      activeNotes = activeNotes.slice(4);
      const generated = NoteGenerator.generate(4);
      generated.forEach(data => {
        activeNotes.push({ data: data, id: 'note-' + globalNoteId++, state: 'pending', errorInput: null, mistakeCount: 0 });
      });

      currentIndex = 0;
      currentNoteStartTime = Date.now();
      renderNotes();
    }

    window.addEventListener('resize', () => {
      const wasNarrow = visibleNoteCount === 4;
      const isNarrow = window.innerWidth < 768;
      if (wasNarrow !== isNarrow) {
        initNotes();
        drawDecorations();
      } else {
        updateViewBoxAndCount();
      }
    });

    // =========================================================
    // Modular Pitch Detection Interface
    // =========================================================
    const PitchDetector = {
      active: 'swiftf0',
      
      algorithms: {
        swiftf0: {
          sampleRate: 16000, // Neural Network requirement
          chunkSize: 2048,   // Neural Network requirement
          session: null,
          isInferencing: false,
          
          init: async function() {
            if (this.session) return;
            if (typeof ort === 'undefined') {
              throw new Error("ONNX Runtime (ort) is not defined. Ensure ort.wasm.min.js is loaded.");
            }
            ort.env.wasm.wasmPaths = './';
            ort.env.wasm.numThreads = 1;
            const options = { executionProviders: ['wasm'], intraOpNumThreads: 1, interOpNumThreads: 1 };
            this.session = await ort.InferenceSession.create('model.onnx', options);
          },
          
          detect: async function(buffer) {
            if (!this.session || this.isInferencing) return null;
            this.isInferencing = true;
            try {
              const tensor = new ort.Tensor('float32', buffer, [1, buffer.length]);
              const feeds = { [this.session.inputNames[0]]: tensor };
              const results = await this.session.run(feeds);
              const pitchOut = results[this.session.outputNames[0]].data;
              const confOut = results[this.session.outputNames[1]].data;
              const lastIdx = pitchOut.length - 1;
              return { pitch: pitchOut[lastIdx], confidence: confOut[lastIdx] };
            } catch (err) {
              console.error("Inference Error:", err);
              return null;
            } finally {
              this.isInferencing = false;
            }
          }
        }
        // Easy to drop in new algorithms here (e.g. 'crepe': { sampleRate: 16000, chunkSize: 1024 ... })
      },

      init: async function() {
        await this.algorithms[this.active].init();
      },

      getConfig: function() {
        return this.algorithms[this.active];
      },

      detect: async function(buffer) {
        return await this.algorithms[this.active].detect(buffer);
      }
    };

    // =========================================================
    // Audio Input Engine (Microphone & Worklet)
    // =========================================================
    const AudioEngine = {
      context: null,
      stream: null,
      workletNode: null,
      pitchHistory: [],
      lastPlayedMidiTimes: {},
      CONSECUTIVE_FRAMES_NEEDED: 1, // Number of stable blocks required to trigger note

      init: async function() {
        if (this.context) return;
        try {
          // 1. Init Algorithm
          AppLog.add("Initializing Pitch Detection Model...");
          await PitchDetector.init();
          AppLog.add(`${PitchDetector.active} model loaded successfully.`);

          // 2. Setup Mic Stream (Unfiltered for pure pitch math)
          this.stream = await navigator.mediaDevices.getUserMedia({ 
            audio: { echoCancellation: false, autoGainControl: false, noiseSuppression: false } 
          });
          
          // 3. Setup AudioContext at hardware default to prevent Firefox crashes
          this.context = new (window.AudioContext || window.webkitAudioContext)();
          
          // 4. Inject PyTorch-style Sinc-Kaiser Downsampling Worklet
          const config = PitchDetector.getConfig();
          const workletCode = `
            class PitchProcessor extends AudioWorkletProcessor {
              constructor(options) {
                super();
                this.inRate = options.processorOptions.inRate;
                this.outRate = options.processorOptions.outRate;
                this.ratio = this.inRate / this.outRate;
                
                // PyTorch Torchaudio sinc_interp_kaiser parameters
                this.a = 6; 
                this.beta = 14.769656459379492; 
                this.rolloff = 0.99;
                
                this.support = this.a * this.ratio; 
                this.i0Beta = this.besselI0(this.beta);
                
                this.inBuffer = new Float32Array(8192); 
                this.inLen = 0;
                this.readPos = this.support; 
                
                this.outBufferSize = options.processorOptions.outBufferSize;
                this.outBuffer = new Float32Array(this.outBufferSize);
                this.outLen = 0;
              }
              
              // Modified Bessel function of the first kind (order 0)
              besselI0(x) {
                let sum = 1.0;
                let term = 1.0;
                const x2_4 = (x * x) / 4.0;
                for (let k = 1; k < 25; k++) {
                  term *= x2_4 / (k * k);
                  sum += term;
                  if (term < 1e-8 * sum) break;
                }
                return sum;
              }
              
              sinc(x) {
                if (x === 0) return 1.0;
                const piX = Math.PI * x;
                return Math.sin(piX) / piX;
              }
              
              sincKaiser(x) {
                if (Math.abs(x) >= this.a) return 0.0;
                const sincVal = this.sinc(x * this.rolloff);
                const arg = Math.sqrt(1.0 - Math.pow(x / this.a, 2));
                const kaiserVal = this.besselI0(this.beta * arg) / this.i0Beta;
                return sincVal * kaiserVal;
              }
              
              process(inputs, outputs, parameters) {
                const input = inputs[0];
                if (!input || input.length === 0) return true;
                const channelData = input[0];
                
                if (this.inLen + channelData.length > this.inBuffer.length) {
                  this.inLen = 0; 
                  this.readPos = this.support;
                }
                this.inBuffer.set(channelData, this.inLen);
                this.inLen += channelData.length;
                
                while (this.readPos + this.support < this.inLen) {
                  let sum = 0;
                  let weightSum = 0;
                  
                  const start = Math.floor(this.readPos - this.support) + 1;
                  const end = Math.floor(this.readPos + this.support);
                  
                  for (let i = start; i <= end; i++) {
                    const weight = this.sincKaiser((i - this.readPos) / this.ratio);
                    sum += this.inBuffer[i] * weight;
                    weightSum += weight;
                  }
                  
                  this.outBuffer[this.outLen++] = weightSum === 0 ? 0 : sum / weightSum;
                  this.readPos += this.ratio;
                  
                  if (this.outLen >= this.outBufferSize) {
                    this.port.postMessage(new Float32Array(this.outBuffer));
                    this.outLen = 0;
                  }
                }
                
                const keepStart = Math.floor(this.readPos - this.support);
                if (keepStart > 0) {
                  const keepCount = this.inLen - keepStart;
                  this.inBuffer.copyWithin(0, keepStart, this.inLen);
                  this.inLen = keepCount;
                  this.readPos -= keepStart;
                }
                
                return true;
              }
            }
            registerProcessor('pitch-processor', PitchProcessor);
          `;
          
          const blob = new Blob([workletCode], { type: 'application/javascript' });
          const workletUrl = URL.createObjectURL(blob);
          await this.context.audioWorklet.addModule(workletUrl);

          const sourceNode = this.context.createMediaStreamSource(this.stream);
          this.workletNode = new AudioWorkletNode(this.context, 'pitch-processor', {
            processorOptions: {
              inRate: this.context.sampleRate,
              outRate: config.sampleRate,
              outBufferSize: config.chunkSize
            }
          });

          // 5. Connect and Handle Inferences
          this.pitchHistory = [];
          this.lastPlayedMidiTimes = {};

          this.workletNode.port.onmessage = async (event) => {
            if (isAppPaused || isShifting) return;
            
            const result = await PitchDetector.detect(event.data);
            if (!result) return;
            
            const { pitch, confidence } = result;

            if (pitch > 0 && confidence >= appSettings.micSensitivity) {
              const midi = hzToMidi(pitch);
              if (midi !== -1) {
                this.pitchHistory.push(midi);
                if (this.pitchHistory.length > this.CONSECUTIVE_FRAMES_NEEDED) this.pitchHistory.shift();

                if (this.pitchHistory.length === this.CONSECUTIVE_FRAMES_NEEDED && this.pitchHistory.every(v => v === midi)) {
                  const now = Date.now();
                  const lastPlayed = this.lastPlayedMidiTimes[midi] || 0;
                  if (now - lastPlayed > appSettings.micCooldown) {
                    this.lastPlayedMidiTimes[midi] = now;
                    InputManager.handleMicInput(midi);
                  }
                }
              } else {
                this.pitchHistory.push(-1);
              }
            } else {
              this.pitchHistory.push(-1);
              if (this.pitchHistory.length > this.CONSECUTIVE_FRAMES_NEEDED) this.pitchHistory.shift();
            }
          };

          sourceNode.connect(this.workletNode);
          AppLog.add("Microphone & AudioWorklet Initialized.");
        } catch (e) {
          console.error('Microphone/Model error:', e);
          AppLog.add(`Setup Failed: ${e.message}`);
          alert('Could not access microphone or load model. Falling back to keyboard.');
          appSettings.input = 'keyboard';
          document.getElementById('setting-input').value = 'keyboard';
          updateInstructions();
        }
      },

      stop: function() {
        if (this.workletNode) { this.workletNode.disconnect(); this.workletNode = null; }
        if (this.stream) { this.stream.getTracks().forEach(t => t.stop()); this.stream = null; }
        if (this.context) { this.context.close(); this.context = null; }
        AppLog.add("Microphone Stopped.");
      }
    };

    // =========================================================
    // Unified Input Manager
    // =========================================================
    function updateBufferDisplay(text) {
      document.getElementById('buffer-display').textContent = text !== undefined ? text : inputBuffer;
    }

    const InputManager = {
      handleKeyboardInput: function(key) {
        if (key >= '0' && key <= '9') {
          if (inputBuffer.length > 0) {
            inputBuffer += key;
            updateBufferDisplay();
            this.evaluateString(inputBuffer);
          }
        } else if (key >= 'a' && key <= 'g') {
          if (inputBuffer.length === 1 && key === 'b') inputBuffer += key;
          else inputBuffer = key;
          updateBufferDisplay();
        } else if (key === '#' || key === 's') {
          if (inputBuffer.length === 1) {
            inputBuffer += '#';
            updateBufferDisplay();
          }
        }
      },

      handleMicInput: function(detectedMidi) {
        const current = activeNotes[currentIndex];
        const displayStr = midiToNoteString(detectedMidi);
        
        updateBufferDisplay(displayStr.toUpperCase());
        setTimeout(() => { if (inputBuffer === '') updateBufferDisplay(''); }, 600);

        if (current.data.midi === detectedMidi) {
          this.triggerSuccess();
        } else {
          this.triggerError(displayStr);
        }
      },

      evaluateString: function(str) {
        const current = activeNotes[currentIndex];
        if (str === current.data.displayStr) {
          this.triggerSuccess();
          inputBuffer = '';
          setTimeout(() => updateBufferDisplay(), 150);
        } else {
          this.triggerError(str);
          inputBuffer = '';
          setTimeout(() => updateBufferDisplay(), 150);
        }
      },

      triggerSuccess: function() {
        const current = activeNotes[currentIndex];
        const timeToPlay = Date.now() - currentNoteStartTime;
        
        NoteGenerator.feedback(current.data, timeToPlay, current.mistakeCount || 0);
        
        current.state = 'correct';
        current.errorInput = null;
        stats.correct++;
        currentIndex++;
        
        currentNoteStartTime = Date.now();
        renderNotes();

        if (currentIndex === 4) {
          isShifting = true;
          setTimeout(() => { shiftNotes(); isShifting = false; }, 350);
        }
      },

      triggerError: function(errStr) {
        const current = activeNotes[currentIndex];
        current.state = 'error';
        current.errorInput = errStr;
        current.mistakeCount = (current.mistakeCount || 0) + 1;
        stats.mistakes++;
        renderNotes();
      }
    };

    window.addEventListener('keydown', (e) => {
      if (isAppPaused || isShifting) return;
      if (appSettings.input === 'mic') return; 
      InputManager.handleKeyboardInput(e.key.toLowerCase());
    });

    // =========================================================
    // Instructions & Stats UI
    // =========================================================
    function updateInstructions() {
      const el = document.getElementById('instruction-text');
      if (appSettings.input === 'mic') {
        el.innerHTML = "Microphone Active. Play the note on your instrument.";
      } else {
        el.innerHTML = 'Type the note name on your keyboard, or <span id="mic-instruction-part">enable the mic in Settings to use an instrument</span>.';
      }
    }

    function updateStatsUI() {
      const now = isAppPaused ? pauseTimestamp : Date.now();
      const elapsedSecs = Math.floor((now - stats.startTime) / 1000);
      const minsDisplay = Math.floor(elapsedSecs / 60).toString().padStart(2, '0');
      const secsDisplay = (elapsedSecs % 60).toString().padStart(2, '0');
      
      document.getElementById('stat-time').textContent = `${minsDisplay}:${secsDisplay}`;
      document.getElementById('stat-correct').textContent = stats.correct;
      document.getElementById('stat-mistakes').textContent = stats.mistakes;
      
      const total = stats.correct + stats.mistakes;
      const ratio = total === 0 ? 0 : Math.round((stats.correct / total) * 100);
      document.getElementById('stat-ratio').textContent = `${ratio}%`;

      const minsFloat = elapsedSecs / 60;
      const netNotes = Math.max(0, stats.correct - stats.mistakes);
      const npm = minsFloat > 0 ? Math.round(netNotes / minsFloat) : 0;
      document.getElementById('stat-npm').innerHTML = `${npm} <span style="font-size: 0.8rem; font-weight: normal; color: #666;">NPM</span>`;
    }

    setInterval(() => updateStatsUI(), 1000);

    // =========================================================
    // Overlay Controls
    // =========================================================
    document.getElementById('log-btn').addEventListener('click', () => {
      document.getElementById('log-overlay').style.display = 'flex';
      checkPauseState();
      AppLog.render();
    });

    document.getElementById('log-return').addEventListener('click', () => {
      document.getElementById('log-overlay').style.display = 'none';
      checkPauseState();
    });

    document.getElementById('stats-btn').addEventListener('click', () => {
      document.getElementById('stats-overlay').style.display = 'flex';
      checkPauseState();
      updateStatsUI();
    });

    document.getElementById('stats-return').addEventListener('click', () => {
      document.getElementById('stats-overlay').style.display = 'none';
      checkPauseState();
    });

    document.getElementById('stat-reset').addEventListener('click', () => {
      stats.startTime = Date.now();
      stats.correct = 0;
      stats.mistakes = 0;
      if (isAppPaused) {
        pauseTimestamp = Date.now();
      }
      updateStatsUI();
      AppLog.add("Stats manually reset.");
    });

    // =========================================================
    // Settings Controls
    // =========================================================
    let hasOpenedSettings = false;

    document.getElementById('settings-btn').addEventListener('click', () => {
      document.getElementById('settings-overlay').style.display = 'flex';
      checkPauseState();
      
      const isTeaching = document.getElementById('setting-mode').value === 'teaching';
      document.getElementById('row-teaching-keys').style.display = isTeaching ? 'flex' : 'none';
      document.getElementById('row-teaching-scale').style.display = isTeaching ? 'flex' : 'none';

      const isChords = document.getElementById('setting-mode').value === 'chords';
      document.getElementById('row-chord-style').style.display = isChords ? 'flex' : 'none';
      
      const isGrandTwoHand = document.getElementById('setting-clef').value === 'grand' && document.getElementById('setting-grand-mode').value === 'two-hand';
      document.getElementById('row-chord-alternate').style.display = (isChords && isGrandTwoHand) ? 'flex' : 'none';

      const isMic = document.getElementById('setting-input').value === 'mic';
      document.getElementById('row-mic-sensitivity').style.display = isMic ? 'flex' : 'none';
      document.getElementById('row-mic-cooldown').style.display = isMic ? 'flex' : 'none';
      
      document.getElementById('row-grand-mode').style.display = document.getElementById('setting-clef').value === 'grand' ? 'flex' : 'none';
      updateStatsUI();

      if (!hasOpenedSettings) {
        hasOpenedSettings = true;
        const inputRow = document.getElementById('row-input-method');
        inputRow.classList.add('flash-highlight');
        setTimeout(() => inputRow.classList.remove('flash-highlight'), 3000);
      }
    });

    document.getElementById('setting-clef').addEventListener('change', (e) => {
      const isGrand = e.target.value === 'grand';
      const isChords = document.getElementById('setting-mode').value === 'chords';
      const isTwoHand = document.getElementById('setting-grand-mode').value === 'two-hand';
      
      document.getElementById('row-grand-mode').style.display = isGrand ? 'flex' : 'none';
      document.getElementById('row-chord-alternate').style.display = (isChords && isGrand && isTwoHand) ? 'flex' : 'none';
    });

    document.getElementById('setting-grand-mode').addEventListener('change', (e) => {
      const isChords = document.getElementById('setting-mode').value === 'chords';
      const isGrand = document.getElementById('setting-clef').value === 'grand';
      const isTwoHand = e.target.value === 'two-hand';
      
      document.getElementById('row-chord-alternate').style.display = (isChords && isGrand && isTwoHand) ? 'flex' : 'none';
    });

    document.getElementById('setting-mode').addEventListener('change', (e) => {
      const isTeaching = e.target.value === 'teaching';
      document.getElementById('row-teaching-keys').style.display = isTeaching ? 'flex' : 'none';
      document.getElementById('row-teaching-scale').style.display = isTeaching ? 'flex' : 'none';

      const isChords = e.target.value === 'chords';
      const isGrandTwoHand = document.getElementById('setting-clef').value === 'grand' && document.getElementById('setting-grand-mode').value === 'two-hand';
      
      document.getElementById('row-chord-style').style.display = isChords ? 'flex' : 'none';
      document.getElementById('row-chord-alternate').style.display = (isChords && isGrandTwoHand) ? 'flex' : 'none';
    });

    document.getElementById('setting-input').addEventListener('change', (e) => {
      const isMic = e.target.value === 'mic';
      document.getElementById('row-mic-sensitivity').style.display = isMic ? 'flex' : 'none';
      document.getElementById('row-mic-cooldown').style.display = isMic ? 'flex' : 'none';
    });

    document.getElementById('setting-mic-cooldown').addEventListener('input', (e) => {
      document.getElementById('mic-cooldown-display').textContent = e.target.value + 'ms';
    });

    document.getElementById('settings-save').addEventListener('click', async () => {
      const saveBtn = document.getElementById('settings-save');
      
      appSettings.clef = document.getElementById('setting-clef').value;
      appSettings.grandMode = document.getElementById('setting-grand-mode').value;
      appSettings.key = document.getElementById('setting-key').value;
      appSettings.accidentals = document.getElementById('setting-accidentals').value === 'enabled';
      appSettings.octave = parseInt(document.getElementById('setting-octave').value, 10);
      
      appSettings.mode = document.getElementById('setting-mode').value;
      appSettings.chordStyle = document.getElementById('setting-chord-style').value;
      appSettings.chordAlternate = document.getElementById('setting-chord-alternate').value === 'enabled';
      
      appSettings.teachingKeys = parseInt(document.getElementById('setting-teaching-keys').value, 10);
      appSettings.teachingScale = parseInt(document.getElementById('setting-teaching-scale').value, 10);
      
      appSettings.micSensitivity = parseFloat(document.getElementById('setting-mic-sensitivity').value);
      appSettings.micCooldown = parseInt(document.getElementById('setting-mic-cooldown').value, 10);
      
      appSettings.trebleMin = document.getElementById('setting-treble-min').value;
      appSettings.trebleMax = document.getElementById('setting-treble-max').value;
      appSettings.bassMin = document.getElementById('setting-bass-min').value;
      appSettings.bassMax = document.getElementById('setting-bass-max').value;

      const prevInput = appSettings.input;
      appSettings.input = document.getElementById('setting-input').value;
      updateInstructions();

      if (appSettings.input === 'mic' && prevInput !== 'mic') {
        saveBtn.disabled = true;
        saveBtn.textContent = "Loading Pitch Detection model...";
        await AudioEngine.init();
        saveBtn.disabled = false;
        saveBtn.textContent = "Save & Reset Staff";
      } else if (appSettings.input === 'keyboard' && prevInput === 'mic') {
        AudioEngine.stop();
      }
      
      document.getElementById('settings-overlay').style.display = 'none';
      checkPauseState();
      
      inputBuffer = '';
      updateBufferDisplay('');
      buildPools();
      drawDecorations();
      initNotes();
    });

    // =========================================================
    // Boot App
    // =========================================================
    const micInstructionPart = document.getElementById('mic-instruction-part');
    if (micInstructionPart) {
      micInstructionPart.classList.add('flash-text-gaudy');
    }
    
    AppLog.add("Application Started.");
    if (typeof ort === 'undefined') {
      AppLog.add("Warning: ort (ONNX Runtime) not found. Microphone SwiftF0 will not work.");
    }
    buildPools();
    drawDecorations();
    initNotes();

  </script>
</body>
