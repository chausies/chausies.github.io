<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Screen</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background-color: black;
    }

    .instructions {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      color: white;
      background-color: rgba(0, 0, 0, 0.8);
      padding: 20px;
      border-radius: 10px;
      opacity: 1;
      transition: opacity 1s ease-in-out;
      text-align: center;
      pointer-events: none;
    }

    .clock {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 24px;
      color: #a9a9a9;
      background-color: rgba(0, 0, 0, 0.8);
      padding: 10px;
      border-radius: 5px;
      font-family: 'Courier New', Courier, monospace;
      user-select: none;
    }

    /* Message box for errors since alert() is prohibited */
    #error-message {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff4444;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      display: none;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="error-message"></div>
  <div class="instructions" id="instructions">
    Long-click (hold) to toggle fullscreen.<br>
    Quick click to toggle clock.
  </div>
  <div class="clock" id="clock"></div>

  <script>
    let pressTimer;
    let isLongPress = false;
    const LONG_PRESS_DURATION = 500; // ms

    function showError(msg) {
      const err = document.getElementById('error-message');
      err.textContent = msg;
      err.style.display = 'block';
      setTimeout(() => { err.style.display = 'none'; }, 3000);
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          showError(`Fullscreen failed: ${err.message}`);
        });
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    }

    function toggleClockVisibility() {
      const clockElement = document.getElementById('clock');
      clockElement.style.display = clockElement.style.display === 'none' ? 'block' : 'none';
    }

    function updateClock() {
      const clockElement = document.getElementById('clock');
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      clockElement.textContent = `${hours}:${minutes}:${seconds}`;
    }

    // Set up long press logic
    function handleStart(e) {
      isLongPress = false;
      pressTimer = setTimeout(() => {
        isLongPress = true;
        toggleFullscreen();
      }, LONG_PRESS_DURATION);
    }

    function handleEnd(e) {
      clearTimeout(pressTimer);
      // If the press was released before the timer, it's a quick click
      if (!isLongPress && e.type !== 'contextmenu') {
        toggleClockVisibility();
      }
      isLongPress = false;
    }

    // Event Listeners
    document.body.addEventListener('mousedown', handleStart);
    document.body.addEventListener('mouseup', handleEnd);
    
    // Support touch devices
    document.body.addEventListener('touchstart', (e) => {
      // e.preventDefault(); // Uncomment if touch scrolling/zoom is an issue
      handleStart(e);
    }, { passive: true });
    
    document.body.addEventListener('touchend', (e) => {
      handleEnd(e);
    }, { passive: true });

    // Prevent context menu from popping up on long press
    window.oncontextmenu = function(event) {
      if (isLongPress) {
        event.preventDefault();
        event.stopPropagation();
        return false;
      }
    };

    // Initializations
    setInterval(updateClock, 1000);
    updateClock();

    window.onload = function() {
      setTimeout(function() {
        const instructions = document.getElementById('instructions');
        instructions.style.opacity = '0';
        setTimeout(function() {
          instructions.style.display = 'none';
        }, 1000);
      }, 4000);
    };
  </script>
</body>
</html>
