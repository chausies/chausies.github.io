<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Weather Dashboard</title>
  <style>
    /* --- DESIGN PARAMETERS --- */
    :root {
      --bg-color: #000;
      --text-color: #e0e0e0;
      --accent-yellow: #f1c40f;
      --accent-blue: #3498db;
      --grid-color: #444;
      --label-color: #777;
      --left-width: 20%;
      --middle-width: 50%;
      --right-width: 30%;
    }

    * { box-sizing: border-box; }
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, system-ui, sans-serif;
      overflow: hidden;
    }

    #app { 
      display: flex; 
      width: 100%; 
      height: 100%; 
      padding: 10px 20px 0 20px;
      gap: 30px; 
    }

    #setup-screen { display: flex; justify-content: center; align-items: center; height: 100%; }
    section { height: 100%; min-width: 0; }

    /* --- LEFT PANEL --- */
    #left-panel { 
      flex: 0 0 var(--left-width); 
      display: flex; 
      flex-direction: column;
      padding-bottom: 1%;
      padding-top: 0;
    }
    
    .lp-section {
      flex: 1; 
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .lp-top { font-size: 10vh; align-items: center; line-height: 1.1; }
    .time-large { font-size: 2em; font-weight: 200; }
    .date-sub { font-size: 1em; opacity: 0.6; margin-top: 5px; }

    .lp-mid { flex-direction: row !important; align-items: center; gap: 15px; font-size: 20vh; }
    .weather-icon-main { font-size: 1em; line-height: 1; }
    .temp-current { font-size: 1em; font-weight: 700; color: var(--accent-yellow); line-height: 1; }

    /* Bottom section changed to 2x2 grid */
    .lp-bot { 
      display: grid !important;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      font-size: 6vh; 
      align-items: center; 
      gap: 5px;
      text-align: center;
    }
    .lp-bot > div {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .lp-bot-val { font-weight: 600; }
    .lp-bot-sub { font-size: 0.5em; color: var(--label-color); text-transform: uppercase; margin-top: 2px; }
    .wind-arrow { display: inline-block; font-style: normal; }

    /* --- MIDDLE PANEL  --- */
    #middle-panel { flex: 0 0 var(--middle-width); position: relative; }
    .graph-container { 
      position: absolute; 
      top: 20px; bottom: 40px; left: 45px; right: 45px; 
    }
    svg { width: 100%; height: 100%; display: block; overflow: visible; }
    
    .axis-label { position: absolute; font-size: 1.4rem; color: var(--label-color); white-space: nowrap; font-weight: 500; }
    .label-y-temp { left: -45px; text-align: right; width: 40px; }
    .label-y-rain { right: -50px; text-align: left; width: 45px; color: var(--accent-blue); }
    .label-x-time { bottom: -30px; transform: translateX(-50%); }

    /* --- RIGHT PANEL --- */
    #right-panel {
      flex: 0 0 var(--right-width);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 15px;
      padding-bottom: 1%;
      padding-right: 4%;
      padding-left: 1%;
      padding-top: 0;
    }
    .day-cell {
      background: #0d0d0d; border-radius: 8px; border: 1px solid #222;
      display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;
      padding: 1px;
      font-size: 8vh; 
    }
    .day-name { font-weight: bold; font-size: 0.8em; color: #aaa; text-transform: uppercase; }
    .day-icon { font-size: 1.6em; }
    .day-temp { font-size: 0.9em; font-weight: 700; }
    .day-rain { font-size: 0.7em; color: var(--accent-blue); font-weight: 500; }

    input { background: #111; border: 1px solid #333; color: white; padding: 15px; font-size: 1.5rem; border-radius: 4px; text-align: center; }
    .hidden { display: none !important; }

    .tooltip { position: relative; display: inline-block; }
    .tooltip .tooltiptext {
      visibility: hidden; width: 140px; background: #222; color: #fff; font-size: 1rem;
      text-align: center; padding: 8px; position: absolute; z-index: 10; bottom: 110%; left: 50%; transform: translateX(-50%);
      border: 1px solid #444; border-radius: 4px;
    }
    .tooltip:hover .tooltiptext { visibility: visible; }
  </style>
</head>
<body>

  <div id="setup-screen" class="hidden">
    <input type="text" id="city-input" placeholder="Enter City Name..." autofocus>
  </div>

  <div id="app" class="hidden">
    <section id="left-panel">
      <div class="lp-section lp-top">
        <div id="display-time" class="time-large">--:--</div>
        <div id="display-date" class="date-sub">--- --</div>
      </div>
      <div class="lp-section lp-mid">
        <div class="tooltip">
          <span id="display-icon" class="weather-icon-main">--</span>
          <span id="display-desc" class="tooltiptext">Loading...</span>
        </div>
        <div id="display-temp" class="temp-current">--°</div>
      </div>
      <div class="lp-section lp-bot">
        <div>
          <span class="lp-bot-val">💨 <span id="display-wind">--</span> <b id="wind-dir" class="wind-arrow">↑</b></span>
          <span class="lp-bot-sub">Wind mph</span>
        </div>
        <div>
          <span class="lp-bot-val"><span id="display-moon-icon">🌑</span> <span id="display-moon-text">-- d to NM</span></span>
          <span class="lp-bot-sub">Moon Phase</span>
        </div>
        <div>
          <span class="lp-bot-val">☀️ <span id="display-sunrise">--:--</span></span>
          <span class="lp-bot-sub">Sunrise</span>
        </div>
        <div>
          <span class="lp-bot-val">🌙 <span id="display-sunset">--:--</span></span>
          <span class="lp-bot-sub">Sunset</span>
        </div>
      </div>
    </section>

    <section id="middle-panel">
      <div class="graph-container" id="graph-box"></div>
    </section>

    <section id="right-panel"></section>
  </div>

<script>
  const WEATHER_FETCH_MINS = 30;
  const CLOCK_TICK_SECS = 5;

  const WMO_MAP = {
    0: { icon: "☀️", desc: "Clear" }, 1: { icon: "🌤️", desc: "Mostly Clear" }, 2: { icon: "⛅", desc: "Partly Cloudy" },
    3: { icon: "☁️", desc: "Overcast" }, 45: { icon: "🌫️", desc: "Fog" }, 51: { icon: "🌦️", desc: "Drizzle" },
    61: { icon: "🌧️", desc: "Light Rain" }, 63: { icon: "🌧️", desc: "Rain" }, 65: { icon: "🌧️", desc: "Heavy Rain" },
    80: { icon: "🌦️", desc: "Showers" }, 95: { icon: "🌩️", desc: "Thunderstorm" }
  };

  async function init() {
    const hash = window.location.hash;
    if (hash.startsWith("#loc=")) {
      const [lat, lon] = hash.replace("#loc=", "").split(",");
      document.getElementById("app").classList.remove("hidden");
      startApp(lat, lon);
    } else {
      document.getElementById("setup-screen").classList.remove("hidden");
      const inp = document.getElementById("city-input");
      inp.addEventListener("keypress", async (e) => {
        if (e.key === "Enter") {
          const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(inp.value)}&count=1`).then(r => r.json());
          if (res.results?.[0]) {
            const loc = res.results[0];
            window.location.hash = `#loc=${loc.latitude},${loc.longitude}`;
            location.reload();
          }
        }
      });
    }
  }

  function startApp(lat, lon) {
    const tick = () => {
      const now = new Date();
      document.getElementById("display-time").textContent = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }).toLowerCase();
      document.getElementById("display-date").textContent = now.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
      updateMoonPhase();
    };
    tick();
    setInterval(tick, CLOCK_TICK_SECS * 1000);

    const loadWeather = () => fetchWeather(lat, lon);
    loadWeather();
    setInterval(loadWeather, WEATHER_FETCH_MINS * 60 * 1000);

    window.addEventListener('resize', () => { if(window.rawWeather) render(window.rawWeather); });
  }

  function updateMoonPhase() {
    const now = new Date();
    // Julian date for J2000 epoch
    const lp = 2551442.8; // Lunar period in seconds
    const newMoonRef = new Date('2000-01-06T18:14:00Z');
    const diff = (now.getTime() - newMoonRef.getTime()) / 1000;
    const phase = (diff % lp) / lp; // 0 to 1

    let icon = "🌑";
    if (phase < 0.06 || phase > 0.94) icon = "🌑";
    else if (phase < 0.19) icon = "🌒";
    else if (phase < 0.31) icon = "🌓";
    else if (phase < 0.44) icon = "🌔";
    else if (phase < 0.56) icon = "🌕";
    else if (phase < 0.69) icon = "🌖";
    else if (phase < 0.81) icon = "🌗";
    else icon = "🌘";

    const daysInCycle = lp / 86400;
    const currentDay = phase * daysInCycle;
    
    let moonText = "";
    if (currentDay <= daysInCycle / 2) {
      // Days until Full Moon
      const toFM = Math.ceil((daysInCycle / 2) - currentDay);
      moonText = `${toFM}d to FM`;
    } else {
      // Days until New Moon
      const toNM = Math.ceil(daysInCycle - currentDay);
      moonText = `${toNM}d to NM`;
    }

    document.getElementById("display-moon-icon").textContent = icon;
    document.getElementById("display-moon-text").textContent = moonText;
  }

  async function fetchWeather(lat, lon) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,precipitation_probability&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset&temperature_unit=fahrenheit&timezone=auto&forecast_days=7`;
    try {
      const data = await fetch(url).then(r => r.json());
      window.rawWeather = data;
      render(data);
    } catch (e) { console.error("Weather fetch error:", e); }
  }

  function render(data) {
    const cur = data.current_weather;
    const w = WMO_MAP[cur.weathercode] || { icon: "🌡️", desc: "Clear" };
    
    document.getElementById("display-temp").textContent = `${Math.round(cur.temperature)}°`;
    document.getElementById("display-icon").textContent = w.icon;
    document.getElementById("display-desc").textContent = w.desc;
    document.getElementById("display-wind").textContent = Math.round(cur.windspeed);
    document.getElementById("wind-dir").style.transform = `rotate(${cur.winddirection}deg)`;
    
    const sunrise = new Date(data.daily.sunrise[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}).toLowerCase();
    const sunset = new Date(data.daily.sunset[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}).toLowerCase();
    document.getElementById("display-sunrise").textContent = sunrise;
    document.getElementById("display-sunset").textContent = sunset;

    renderGraph(data);

    const right = document.getElementById("right-panel");
    right.innerHTML = "";
    
    if (data.daily && data.daily.time) {
      for (let i = 1; i <= 6; i++) {
        const dateStr = data.daily.time[i];
        const code = data.daily.weathercode[i];
        const minT = data.daily.temperature_2m_min[i];
        const maxT = data.daily.temperature_2m_max[i];
        const rain = data.daily.precipitation_probability_max[i];
        const meta = WMO_MAP[code] || { icon: "☁️", desc: "Cloudy" };
        const [year, month, day] = dateStr.split('-');
        const d = new Date(year, month - 1, day).toLocaleDateString([], { weekday: 'short' });

        right.innerHTML += `
          <div class="day-cell" title="${meta.desc}">
            <div class="day-name">${d}</div>
            <div class="day-icon">${meta.icon}</div>
            <div class="day-temp">${Math.round(minT)}°/${Math.round(maxT)}°</div>
            <div class="day-rain">${rain}%</div>
          </div>`;
      }
    }
  }

  function renderGraph(data) {
    const container = document.getElementById("graph-box");
    container.innerHTML = "";
    const width = container.clientWidth;
    const height = container.clientHeight;

    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const hour = String(now.getHours()).padStart(2, '0');
    const localHourStr = `${year}-${month}-${day}T${hour}:00`;

    let startIndex = data.hourly.time.findIndex(t => t.startsWith(localHourStr));
    if (startIndex === -1) startIndex = 0;

    const temps = data.hourly.temperature_2m.slice(startIndex, startIndex + 24);
    const rains = data.hourly.precipitation_probability.slice(startIndex, startIndex + 24);
    const times = data.hourly.time.slice(startIndex, startIndex + 24).map(t => new Date(t));

    const minT = Math.floor(Math.min(...temps) / 10) * 10 - 10;
    const maxT = Math.ceil(Math.max(...temps) / 10) * 10 + 10;
    const maxR = Math.max(5, Math.ceil(Math.max(...rains) / 10) * 10);

    const getX = (i) => (i / 23) * width;
    const getYT = (v) => height - ((v - minT) / (maxT - minT)) * height;
    const getYR = (v) => height - (v / maxR) * height;

    let svg = "";

    times.forEach((t, i) => {
      if (t.getHours() % 3 === 0) {
        const x = getX(i);
        svg += `<line x1="${x}" y1="0" x2="${x}" y2="${height}" stroke="var(--grid-color)" stroke-width=2 />`;
        const lbl = document.createElement("div");
        lbl.className = "axis-label label-x-time";
        lbl.style.left = `${x}px`;
        const h = t.getHours();
        lbl.textContent = h === 12 ? "12n" : (h === 0 ? "12m" : (h > 12 ? (h-12)+'p' : h+'a'));
        container.appendChild(lbl);
      }
    });

    for (let t = minT; t <= maxT; t += 5) {
      const y = getYT(t);
      svg += `<line x1="0" y1="${y}" x2="${width}" y2="${y}" stroke="var(--grid-color)" stroke-width=2 />`;
      if (t % 10 === 0) {
        const lbl = document.createElement("div");
        lbl.className = "axis-label label-y-temp";
        lbl.style.top = `${y - 10}px`;
        lbl.textContent = `${t}°`;
        container.appendChild(lbl);
      }
    }

    const rLbl = document.createElement("div");
    rLbl.className = "axis-label label-y-rain";
    rLbl.style.top = "-15px";
    rLbl.textContent = `${maxR}% 🌧️`;
    container.appendChild(rLbl);

    const tPts = temps.map((v, i) => [getX(i), getYT(v)]);
    const rPts = rains.map((v, i) => [getX(i), getYR(v)]);

    svg += `<path d="${makeSpline(rPts)}" fill="none" stroke="var(--accent-blue)" stroke-width="4" />`;
    svg += `<path d="${makeSpline(tPts)}" fill="none" stroke="var(--accent-yellow)" stroke-width="4" />`;

    const s = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    s.setAttribute("viewBox", `0 0 ${width} ${height}`);
    s.innerHTML = svg;
    container.appendChild(s);
  }

  function makeSpline(p) {
    if (p.length < 2) return "";
    let d = `M ${p[0][0]},${p[0][1]}`;
    for (let i = 0; i < p.length - 1; i++) {
      const p0 = p[Math.max(0, i-1)], p1 = p[i], p2 = p[i+1], p3 = p[Math.min(p.length-1, i+2)];
      const c1x = p1[0] + (p2[0]-p0[0])/6, c1y = p1[1] + (p2[1]-p0[1])/6;
      const c2x = p2[0] - (p3[0]-p1[0])/6, c2y = p2[1] - (p3[1]-p1[1])/6;
      d += ` C ${c1x},${c1y} ${c2x},${c2y} ${p2[0]},${p2[1]}`;
    }
    return d;
  }

  init();
</script>
</body>
</html>
